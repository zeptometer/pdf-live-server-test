<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Live Viewer</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script type="module" crossorigin src="/assets/index-BGDotQuR.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CrkAyqlW.css">
</head>
<body>
  <div id="pdf-container">
    <!-- PDF pages will be rendered here as canvas elements -->
  </div>
  
  <div id="fab-container">
    <div id="zoom-menu" class="hidden">
      <button id="btn-fullscreen">
        <span class="material-symbols-outlined">fullscreen</span>
        <span class="btn-text">Fullscreen</span>
      </button>
      <div class="menu-divider"></div>
      <button class="zoom-option active" data-mode="width">
        <span class="material-symbols-outlined">width_full</span>
        <span class="btn-text">Fit Width</span>
      </button>
      <button class="zoom-option" data-mode="height">
        <span class="material-symbols-outlined">height</span>
        <span class="btn-text">Fit Height</span>
      </button>
      <button class="zoom-option" data-mode="100">
        <span class="material-symbols-outlined">zoom_in_map</span>
        <span class="btn-text">100%</span>
      </button>
    </div>
    <button id="btn-fab">
      <span class="material-symbols-outlined">menu</span>
    </button>
  </div>

  <button id="nav-left" class="nav-btn">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  <button id="nav-right" class="nav-btn">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>

</body>
</html>
